<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>eFootball League · Fixtures</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #eef5ff, #e0eafc);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            color: #0a1c1f;
            padding: 0 0 32px 0;
        }

        :root {
            --nano-teal: #2dd4bf;
            --nano-card: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(45, 212, 191, 0.2);
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #0b2b26 0%, #1c4e44 50%, #1c6356 100%);
            padding: 28px 20px 32px;
            text-align: center;
            border-radius: 0 0 32px 32px;
            box-shadow: var(--shadow-md);
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #5ee0fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            color: #c1f0e8;
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .fix-note {
            background: #fbbf2420;
            border-radius: 60px;
            display: inline-block;
            padding: 4px 16px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #fbbf24;
        }

        .container {
            max-width: 600px;
            margin: -18px auto 0;
            padding: 0 16px;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--nano-card);
            border-radius: 28px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--glass-border);
        }

        .stat-card h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #1e5a54;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0f2e2c, #1c6e60);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .reset-btn {
            background: rgba(255,255,255,0.85);
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 700;
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .round-section {
            background: var(--nano-card);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 16px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }

        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 12px;
        }

        .round-title {
            font-size: 1.65rem;
            font-weight: 800;
            background: linear-gradient(125deg, #134e4a, #2dd4bf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .round-nav button {
            background: #eef3fc;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .round-nav button:disabled { opacity: 0.4; }

        .matches-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-card {
            background: white;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #e2f0ef;
        }

        .match-card.completed {
            background: #eefaf7;
            border-left: 5px solid #2dd4bf;
        }

        .match-teams {
            font-weight: 700;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 6px;
        }

        .home-team, .away-team {
            background: #f1f9f7;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .vs { color: #7f8e8b; font-size: 0.7rem; }

        .match-score {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .match-score input {
            width: 60px;
            padding: 10px 4px;
            text-align: center;
            font-weight: 700;
            border: 1.5px solid #cbe5e2;
            border-radius: 28px;
        }

        .update-btn {
            background: #1d6f62;
            border: none;
            color: white;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
        }

        .info-panels {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 16px 0 24px;
        }

        .panel {
            background: var(--nano-card);
            border-radius: 32px;
            padding: 18px 20px;
            border: 1px solid var(--glass-border);
        }

        .panel h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            border-left: 5px solid #2dd4bf;
            padding-left: 14px;
        }

        .scorer-item, .history-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #daf2ec;
        }

        .table-wrapper {
            background: rgba(255,255,255,0.9);
            border-radius: 32px;
            padding: 8px 4px;
            overflow-x: auto;
        }

        .league-table {
            width: 100%;
            min-width: 560px;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .league-table th {
            background: #0c2b27;
            color: white;
            padding: 12px 5px;
        }

        .league-table td {
            padding: 10px 4px;
            text-align: center;
            border-bottom: 1px solid #cbe5e0;
        }

        .top-rank { background: #fff9e6; font-weight: 800; }

        @media (max-width: 560px) {
            .match-card { flex-direction: column; align-items: stretch; }
            .match-teams { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>⚽ eFOOTBALL LEAGUE</h1>
</div>
<div class="container">
    <div class="stats-summary" id="statsSummary"></div>
    <button class="reset-btn" id="globalResetBtn">🗑️ RESET ALL RESULTS</button>
    <div class="round-section">
        <div class="round-header">
            <div class="round-title" id="roundTitle">Round 1</div>
            <div class="round-nav">
                <button id="prevRoundBtn">← PREV</button>
                <button id="nextRoundBtn">NEXT →</button>
            </div>
        </div>
        <div class="matches-grid" id="matchesGrid"></div>
    </div>
    <div class="info-panels">
        <div class="panel"><h3>🔥 TOP SCORING TEAMS</h3><div id="topScorersList"></div></div>
        <div class="panel"><h3>📋 RECENT BATTLES</h3><div id="matchHistoryList"></div></div>
    </div>
    <div class="table-wrapper">
        <table class="league-table">
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>PTS</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ---------- TEAMS (exactly as provided) ----------
    const teams = ["Enzo","Tiger","Issah Stephen","Alex","Unruly Dazzy","Niina Ragga","Quame Dollar","Inusah Richkid","Bless Dee","Kotoko"];
    
    // ---------- STANDARD CIRCLE METHOD FOR SINGLE ROUND-ROBIN ----------
    function generateSingleRoundRobin(teamList) {
        const n = teamList.length;
        if (n % 2 !== 0) throw new Error("Even number of teams required");
        const rounds = [];
        const rotated = [...teamList];
        const half = n / 2;
        for (let round = 0; round < n - 1; round++) {
            const roundMatches = [];
            for (let i = 0; i < half; i++) {
                const home = rotated[i];
                const away = rotated[n - 1 - i];
                roundMatches.push([home, away]);
            }
            rounds.push(roundMatches);
            // rotate (keep first element fixed)
            const last = rotated.pop();
            rotated.splice(1, 0, last);
        }
        return rounds;
    }
    
    // First leg: 9 rounds, each pair exactly once
    const firstLeg = generateSingleRoundRobin(teams);
    // Second leg: home/away swapped
    const secondLeg = firstLeg.map(round => round.map(([h, a]) => [a, h]));
    const allRounds = [...firstLeg, ...secondLeg];  // 18 rounds
    const TOTAL_MATCHES = allRounds.length * (teams.length / 2);
    
    // ---------- PERSISTENCE (localStorage) ----------
    const STORAGE_KEY = "efootball_fixtures";
    let matchesDB = {};
    
    function loadMatches() {
        const stored = localStorage.getItem(STORAGE_KEY);
        matchesDB = stored ? JSON.parse(stored) : {};
    }
    function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(matchesDB));
    }
    function getMatchKey(home, away, round) {
        return `${home}|${away}|${round}`;
    }
    function saveResult(home, away, round, homeScore, awayScore) {
        const key = getMatchKey(home, away, round);
        matchesDB[key] = {
            home_score: homeScore,
            away_score: awayScore,
            played: true,
            updatedAt: Date.now()
        };
        persist();
        refreshAllUI();
    }
    function resetAll() {
        if (!confirm("⚠️ ERASE ALL MATCH RESULTS? This will clear the entire league history.")) return;
        matchesDB = {};
        persist();
        refreshAllUI();
    }
    
    // ---------- STANDINGS & STATS ----------
    function computeStandings() {
        const stats = {};
        teams.forEach(t => stats[t] = { P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 });
        for (const [key, match] of Object.entries(matchesDB)) {
            if (!match.played) continue;
            const [home, away] = key.split('|');
            const hS = match.home_score, aS = match.away_score;
            stats[home].P += 1; stats[home].GF += hS; stats[home].GA += aS;
            stats[away].P += 1; stats[away].GF += aS; stats[away].GA += hS;
            if (hS > aS) {
                stats[home].W += 1; stats[away].L += 1; stats[home].Pts += 3;
            } else if (aS > hS) {
                stats[away].W += 1; stats[home].L += 1; stats[away].Pts += 3;
            } else {
                stats[home].D += 1; stats[away].D += 1;
                stats[home].Pts += 1; stats[away].Pts += 1;
            }
        }
        for (let t of teams) stats[t].GD = stats[t].GF - stats[t].GA;
        return stats;
    }
    
    function getCompletedCount() {
        return Object.values(matchesDB).filter(m => m.played).length;
    }
    function getTotalGoals() {
        return Object.values(matchesDB).reduce((sum, m) => m.played ? sum + m.home_score + m.away_score : sum, 0);
    }
    
    function refreshStatsAndHistory() {
        const stats = computeStandings();
        const completed = getCompletedCount();
        const totalGoals = getTotalGoals();
        const progress = TOTAL_MATCHES ? Math.round((completed / TOTAL_MATCHES) * 100) : 0;
        let highestTeam = "—", highestGoals = -1;
        for (const [team, s] of Object.entries(stats)) if (s.GF > highestGoals) { highestGoals = s.GF; highestTeam = team; }
        
        document.getElementById('statsSummary').innerHTML = `
            <div class="stat-card"><h3>🎮 COMPLETED</h3><div class="stat-value">${completed}/${TOTAL_MATCHES}</div></div>
            <div class="stat-card"><h3>⚽ TOTAL GOALS</h3><div class="stat-value">${totalGoals}</div></div>
            <div class="stat-card"><h3>💥 TOP SCORER</h3><div class="stat-value">${highestTeam}</div><div style="font-size:0.7rem">${highestGoals} goals</div></div>
            <div class="stat-card"><h3>🏁 PROGRESS</h3><div class="stat-value">${progress}%</div></div>
        `;
        
        const sortedGF = Object.entries(stats).sort((a,b) => b[1].GF - a[1].GF).slice(0,5);
        document.getElementById('topScorersList').innerHTML = sortedGF.map(([team, s], i) => `<div class="scorer-item"><span>${i+1}. ${team}</span><span>⚽ ${s.GF}</span></div>`).join('');
        
        const recent = Object.entries(matchesDB).filter(([,d]) => d.played).map(([key, d]) => {
            const [home, away] = key.split('|');
            return { home, away, homeScore: d.home_score, awayScore: d.away_score, updatedAt: d.updatedAt };
        }).sort((a,b) => b.updatedAt - a.updatedAt).slice(0,10);
        document.getElementById('matchHistoryList').innerHTML = recent.map(m => `<div class="history-item"><div>${m.home} vs ${m.away}</div><div><strong>${m.homeScore} - ${m.awayScore}</strong></div></div>`).join('') || '<div>⚡ No results yet</div>';
        
        const sorted = Object.entries(stats).sort((a,b) => b[1].Pts - a[1].Pts || b[1].GD - a[1].GD);
        document.getElementById('tableBody').innerHTML = sorted.map(([team, s], idx) => `
            <tr ${idx < 3 ? 'class="top-rank"' : ''}>
                <td style="font-weight:700;">${team}</td>
                <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
                <td>${s.GF}</td><td>${s.GA}</td><td>${s.GD}</td>
                <td style="font-weight:800; color:#0f6e5e;">${s.Pts}</td>
            </tr>
        `).join('');
    }
    
    // ---------- ROUND RENDERING ----------
    let currentRound = 0;
    
    function renderRound() {
        const roundMatches = allRounds[currentRound];
        const roundNumber = currentRound + 1;
        const leg = roundNumber <= 9 ? "FIRST LEG" : "SECOND LEG";
        document.getElementById('roundTitle').innerHTML = `🌀 ROUND ${roundNumber} · ${leg} <span style="font-size:0.7rem;">(of 18)</span>`;
        
        const grid = document.getElementById('matchesGrid');
        grid.innerHTML = '';
        for (let [home, away] of roundMatches) {
            const key = getMatchKey(home, away, roundNumber);
            const saved = matchesDB[key];
            const isCompleted = saved?.played === true;
            const homeVal = isCompleted ? saved.home_score : '';
            const awayVal = isCompleted ? saved.away_score : '';
            
            const card = document.createElement('div');
            card.className = `match-card ${isCompleted ? 'completed' : ''}`;
            card.innerHTML = `
                <div class="match-teams">
                    <span class="home-team">${home}</span>
                    <span class="vs">VS</span>
                    <span class="away-team">${away}</span>
                </div>
                <div class="match-score">
                    <input type="number" class="score-input" id="home_${home}_${away}_${roundNumber}" placeholder="H" value="${homeVal}" ${isCompleted ? 'disabled' : ''}>
                    <span>—</span>
                    <input type="number" class="score-input" id="away_${home}_${away}_${roundNumber}" placeholder="A" value="${awayVal}" ${isCompleted ? 'disabled' : ''}>
                    ${!isCompleted ? `<button class="update-btn" data-home="${home}" data-away="${away}" data-round="${roundNumber}">✓ SAVE</button>` : '<span style="color:#1d6f62;">✔ FINAL</span>'}
                </div>
            `;
            grid.appendChild(card);
        }
        
        document.querySelectorAll('.update-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const home = btn.dataset.home;
                const away = btn.dataset.away;
                const round = parseInt(btn.dataset.round);
                const homeInput = document.getElementById(`home_${home}_${away}_${round}`);
                const awayInput = document.getElementById(`away_${home}_${away}_${round}`);
                let h = parseInt(homeInput.value) || 0;
                let a = parseInt(awayInput.value) || 0;
                saveResult(home, away, round, h, a);
            });
        });
        
        document.getElementById('prevRoundBtn').disabled = (currentRound === 0);
        document.getElementById('nextRoundBtn').disabled = (currentRound === allRounds.length - 1);
    }
    
    function changeRound(delta) {
        const newRound = currentRound + delta;
        if (newRound >= 0 && newRound < allRounds.length) {
            currentRound = newRound;
            renderRound();
        }
    }
    
    function refreshAllUI() {
        renderRound();
        refreshStatsAndHistory();
    }
    
    // ---------- INIT ----------
    function init() {
        loadMatches();
        refreshAllUI();
        document.getElementById('globalResetBtn').addEventListener('click', resetAll);
        document.getElementById('prevRoundBtn').addEventListener('click', () => changeRound(-1));
        document.getElementById('nextRoundBtn').addEventListener('click', () => changeRound(1));
    }
    init();
</script>
</body>
</html>

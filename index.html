<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>⚡ NANO ARENA · eFootball League · Live Fixtures</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #eefbff, #cdeee8);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    :root {
      --nano-teal: #2dd4bf;
      --nano-deep: #0b2b28;
      --nano-electric: #5ee0fa;
      --glass: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(45, 212, 191, 0.35);
    }

    /* LOGIN MODAL */
    .login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 30, 28, 0.7);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-card {
      background: var(--glass);
      border-radius: 48px;
      padding: 32px 28px;
      width: 90%;
      max-width: 380px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      text-align: center;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h2 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0f5b50, #2dd4bf);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      color: #1f6e62;
      display: block;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 60px;
      border: 1.5px solid #cbe5e0;
      background: white;
      font-size: 1rem;
    }

    .login-btn {
      background: #1c7868;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 60px;
      font-weight: 800;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .error-msg {
      color: #d9534f;
      font-size: 0.8rem;
      margin-top: 12px;
    }

    /* main app */
    .app-container {
      display: none;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(125deg, #0b2b26 0%, #1e6557 100%);
      padding: 28px 20px 32px;
      text-align: center;
      border-radius: 0 0 40px 40px;
      position: relative;
    }

    .badge-role {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,240,0.2);
      backdrop-filter: blur(4px);
      padding: 5px 12px;
      border-radius: 60px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #e5f9f4;
    }

    .header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(145deg, #fff, var(--nano-electric));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #caf5ed;
      color: #caf5ed;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.7rem;
      margin-top: 10px;
      cursor: pointer;
    }

    .stats-summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 24px 0 20px;
    }

    .stat-card {
      background: var(--glass);
      backdrop-filter: blur(8px);
      border-radius: 34px;
      padding: 16px 8px;
      text-align: center;
      border: 1px solid var(--glass-border);
    }

    .stat-value {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(145deg, #0f3e38, #1b998b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .reset-btn {
      background: rgba(255, 235, 230, 0.95);
      border: 1px solid #ffb5a5;
      color: #bc3f2e;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-weight: 800;
      margin-bottom: 24px;
      cursor: pointer;
    }

    .round-section {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(14px);
      border-radius: 38px;
      padding: 22px 16px;
      margin-bottom: 28px;
    }

    .round-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 20px;
      gap: 12px;
    }

    .round-title {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(125deg, #0e5b50, #2dd4bf);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .round-datetime {
      font-size: 0.75rem;
      background: #edf7f5;
      padding: 4px 12px;
      border-radius: 60px;
      font-weight: 600;
      color: #166b5e;
    }

    .round-nav button {
      background: #edf7f5;
      border: none;
      padding: 8px 18px;
      border-radius: 60px;
      font-weight: 700;
      margin: 0 4px;
      cursor: pointer;
    }

    .matches-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .match-card {
      background: white;
      border-radius: 28px;
      padding: 14px 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #e2f3ef;
    }

    .match-card.completed {
      background: #eefdf9;
      border-left: 6px solid #2dd4bf;
    }

    .match-teams {
      font-weight: 700;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .home-team, .away-team {
      background: #effbf8;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.85rem;
    }

    .match-score input {
      width: 64px;
      padding: 10px;
      text-align: center;
      font-weight: 700;
      border: 1.8px solid #cdebe5;
      border-radius: 32px;
    }

    .update-btn {
      background: #1c7868;
      border: none;
      color: white;
      font-weight: 800;
      padding: 8px 22px;
      border-radius: 60px;
      cursor: pointer;
    }

    .info-panels {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: 20px 0;
    }

    .panel {
      background: rgba(255,255,255,0.85);
      border-radius: 34px;
      padding: 20px;
    }

    .panel h3 {
      border-left: 5px solid #2dd4bf;
      padding-left: 14px;
      margin-bottom: 16px;
    }

    .scorer-item, .history-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #daf2ec;
    }

    .table-wrapper {
      background: rgba(255,255,255,0.9);
      border-radius: 32px;
      padding: 10px 6px;
      overflow-x: auto;
    }

    .league-table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
    }

    .league-table th {
      background: #0b332e;
      color: white;
      padding: 12px 5px;
    }

    .league-table td {
      padding: 10px 5px;
      text-align: center;
      border-bottom: 1px solid #d4f0ea;
    }

    .top-rank { background: #fffae6; font-weight: 800; }

    @media (max-width: 560px) {
      .match-card { flex-direction: column; align-items: stretch; }
      .match-score { justify-content: space-between; }
      .round-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-overlay">
  <div class="login-card">
    <h2>⚡ NANO ARENA</h2>
    <p>sign in · user or admin</p>
    <div class="input-group">
      <label>👤 Username</label>
      <input type="text" id="loginUsername" placeholder="user or admin" autocomplete="off">
    </div>
    <div class="input-group">
      <label>🔐 Password</label>
      <input type="password" id="loginPassword" placeholder="••••••">
    </div>
    <button class="login-btn" id="doLoginBtn">ENTER THE PITCH</button>
    <div id="loginError" class="error-msg"></div>
    <div style="font-size: 0.7rem; margin-top: 20px; color:#388e7a;">demo: user/user123 &nbsp;|&nbsp; admin/admin123</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appContainer" class="app-container">
  <div class="header">
    <div class="badge-role" id="roleBadge">👤 USER MODE</div>
    <h1>🏆 NANO eFOOTBALL</h1>
    <p>🏁 fixtures start tonight 8:00 PM · live league</p>
    <button id="logoutBtn" class="logout-btn">🚪 LOGOUT</button>
  </div>

  <div class="stats-summary" id="statsSummary"></div>
  <button id="resetGlobalBtn" class="reset-btn">🗑️ RESET ALL RESULTS</button>

  <div class="round-section">
    <div class="round-header">
      <div>
        <div class="round-title" id="roundTitle">ROUND 1</div>
        <div class="round-datetime" id="roundDateTime">📅 Tonight, 8:00 PM</div>
      </div>
      <div class="round-nav">
        <button id="prevRound">← PREV</button>
        <button id="nextRound">NEXT →</button>
      </div>
    </div>
    <div class="matches-grid" id="matchesGrid"></div>
  </div>

  <div class="info-panels">
    <div class="panel"><h3>🔥 TOP SCORING TEAMS</h3><div id="topScorersList"></div></div>
    <div class="panel"><h3>📋 RECENT BATTLES</h3><div id="matchHistoryList"></div></div>
  </div>

  <div class="table-wrapper">
    <table class="league-table">
      <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>PTS</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  // ---------- FIXTURES & TEAMS ----------
  const teams = ["Enzo","Nween Enock","Issah Stephen","Rich Pogba","Unruly Dazzy","Niina Ragga","Quame Dollar","Inusah Richkid","Bless Dee","Ibrahim"];
  
  const roundsRaw = [
    ["Enzo","Nween Enock"],["Issah Stephen","Rich Pogba"],["Unruly Dazzy","Niina Ragga"],["Quame Dollar","Inusah Richkid"],["Bless Dee","Ibrahim"],
    ["Nween Enock","Issah Stephen"],["Rich Pogba","Unruly Dazzy"],["Niina Ragga","Quame Dollar"],["Inusah Richkid","Bless Dee"],["Ibrahim","Enzo"],
    ["Issah Stephen","Enzo"],["Unruly Dazzy","Nween Enock"],["Quame Dollar","Rich Pogba"],["Bless Dee","Niina Ragga"],["Ibrahim","Inusah Richkid"],
    ["Enzo","Unruly Dazzy"],["Issah Stephen","Quame Dollar"],["Nween Enock","Bless Dee"],["Rich Pogba","Ibrahim"],["Niina Ragga","Inusah Richkid"],
    ["Quame Dollar","Enzo"],["Bless Dee","Issah Stephen"],["Ibrahim","Nween Enock"],["Inusah Richkid","Rich Pogba"],["Unruly Dazzy","Niina Ragga"],
    ["Enzo","Bless Dee"],["Issah Stephen","Ibrahim"],["Nween Enock","Inusah Richkid"],["Rich Pogba","Niina Ragga"],["Quame Dollar","Unruly Dazzy"],
    ["Ibrahim","Enzo"],["Inusah Richkid","Issah Stephen"],["Niina Ragga","Nween Enock"],["Unruly Dazzy","Rich Pogba"],["Bless Dee","Quame Dollar"],
    ["Enzo","Inusah Richkid"],["Issah Stephen","Niina Ragga"],["Nween Enock","Unruly Dazzy"],["Rich Pogba","Bless Dee"],["Quame Dollar","Ibrahim"],
    ["Niina Ragga","Enzo"],["Unruly Dazzy","Issah Stephen"],["Bless Dee","Nween Enock"],["Ibrahim","Rich Pogba"],["Inusah Richkid","Quame Dollar"]
  ];

  function buildAllRounds() {
    let groups = [];
    for (let i = 0; i < roundsRaw.length; i += 5) groups.push(roundsRaw.slice(i, i+5));
    const secondHalf = groups.map(round => round.map(([h,a]) => [a,h]));
    return [...groups, ...secondHalf];
  }
  
  const allRounds = buildAllRounds();      // 18 rounds
  const TOTAL_MATCHES = allRounds.length * 5;
  const STORAGE_KEY = "nano_efootball_matches";
  let matchesDB = {};

  // ---------- DYNAMIC DATE/TIME FOR FIXTURES (starting tonight 8pm) ----------
  function getRoundDateTime(roundIndex) { // roundIndex 0-based
    const now = new Date();
    // set to today at 20:00 (8pm)
    let baseDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 0, 0);
    // if current time is past 20:00, start from tomorrow? but user said "starting this evening by 8pm", we assume first round = tonight at 8pm
    // add roundIndex days
    const targetDate = new Date(baseDate.getTime() + roundIndex * 24 * 60 * 60 * 1000);
    const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    return targetDate.toLocaleDateString(undefined, options) + " • 8:00 PM";
  }

  // ---------- PERSISTENCE ----------
  function loadMatches() {
    const stored = localStorage.getItem(STORAGE_KEY);
    matchesDB = stored ? JSON.parse(stored) : {};
  }
  function persistMatches() { localStorage.setItem(STORAGE_KEY, JSON.stringify(matchesDB)); }

  function getMatchKey(home, away, round) { return `${home}|${away}|${round}`; }

  function saveMatch(home, away, round, homeScore, awayScore) {
    const key = getMatchKey(home, away, round);
    matchesDB[key] = { home_score: homeScore, away_score: awayScore, played: true, updatedAt: Date.now() };
    persistMatches();
    refreshAllUI();
  }

  function resetAllResults() {
    if (!confirm("⚠️ ERASE ALL MATCH RESULTS? This action is permanent.")) return;
    matchesDB = {};
    persistMatches();
    refreshAllUI();
  }

  // ---------- STANDINGS & STATS ----------
  function computeStandings() {
    const stats = {};
    teams.forEach(t => stats[t] = { P:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0 });
    for (const [key, match] of Object.entries(matchesDB)) {
      if (!match.played) continue;
      const [home, away] = key.split('|');
      const hs = match.home_score, as = match.away_score;
      stats[home].P++; stats[home].GF += hs; stats[home].GA += as;
      stats[away].P++; stats[away].GF += as; stats[away].GA += hs;
      if (hs > as) { stats[home].W++; stats[away].L++; stats[home].Pts += 3; }
      else if (as > hs) { stats[away].W++; stats[home].L++; stats[away].Pts += 3; }
      else { stats[home].D++; stats[away].D++; stats[home].Pts += 1; stats[away].Pts += 1; }
    }
    for (let t of teams) stats[t].GD = stats[t].GF - stats[t].GA;
    return stats;
  }

  function getCompletedCount() { return Object.values(matchesDB).filter(m => m.played).length; }
  function getTotalGoals() { return Object.values(matchesDB).reduce((sum,m) => sum + (m.played ? m.home_score + m.away_score : 0), 0); }

  function refreshStatsAndHistory() {
    const stats = computeStandings();
    const completed = getCompletedCount();
    const totalGoals = getTotalGoals();
    const progress = TOTAL_MATCHES ? Math.round((completed / TOTAL_MATCHES) * 100) : 0;
    let topTeam = "—", topG = -1;
    for (const [t,s] of Object.entries(stats)) if (s.GF > topG) { topG = s.GF; topTeam = t; }
    document.getElementById('statsSummary').innerHTML = `
      <div class="stat-card"><h3>🎮 COMPLETED</h3><div class="stat-value">${completed}/${TOTAL_MATCHES}</div></div>
      <div class="stat-card"><h3>⚽ TOTAL GOALS</h3><div class="stat-value">${totalGoals}</div></div>
      <div class="stat-card"><h3>💥 TOP SCORER</h3><div class="stat-value">${topTeam}</div><div style="font-size:0.7rem">⚡ ${topG} goals</div></div>
      <div class="stat-card"><h3>🏁 PROGRESS</h3><div class="stat-value">${progress}%</div></div>
    `;
    const top5 = Object.entries(stats).sort((a,b)=>b[1].GF - a[1].GF).slice(0,5);
    document.getElementById('topScorersList').innerHTML = top5.map(([t,s],i)=>`<div class="scorer-item"><span>${i+1}. ${t}</span><span>⚽ ${s.GF}</span></div>`).join('');
    let recent = [];
    for (const [k,d] of Object.entries(matchesDB)) if(d.played) {
      const [h,a] = k.split('|');
      recent.push({ home: h, away: a, hs: d.home_score, as: d.away_score, updatedAt: d.updatedAt || 0 });
    }
    recent.sort((a,b)=>b.updatedAt - a.updatedAt);
    const last10 = recent.slice(0,10);
    document.getElementById('matchHistoryList').innerHTML = last10.map(m => `<div class="history-item"><div>${m.home} vs ${m.away}</div><div><strong>${m.hs} - ${m.as}</strong></div></div>`).join('') || '<div>⚡ No results yet — first kickoff tonight 8pm!</div>';
  }

  function renderStandings() {
    const stats = computeStandings();
    const sorted = Object.entries(stats).sort((a,b)=>b[1].Pts - a[1].Pts || b[1].GD - a[1].GD);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    sorted.forEach(([team,s],idx) => {
      const row = tbody.insertRow();
      if(idx<3) row.className = 'top-rank';
      row.innerHTML = `<td style="font-weight:800">${team}</td><td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td><td>${s.GF}</td><td>${s.GA}</td><td>${s.GD}</td><td style="font-weight:800;color:#1c7868">${s.Pts}</td>`;
    });
  }

  // ---------- ROUND UI WITH DATETIME ----------
  let currentRoundIdx = 0;
  
  function renderCurrentRound() {
    const matches = allRounds[currentRoundIdx];
    const roundNum = currentRoundIdx + 1;
    const roundDateTime = getRoundDateTime(currentRoundIdx);
    document.getElementById('roundTitle').innerHTML = `🌀 ROUND ${roundNum}`;
    document.getElementById('roundDateTime').innerHTML = `📅 ${roundDateTime}`;
    
    const grid = document.getElementById('matchesGrid');
    grid.innerHTML = '';
    for (let [home, away] of matches) {
      const key = getMatchKey(home, away, roundNum);
      const saved = matchesDB[key];
      const isCompleted = saved && saved.played;
      const homeVal = isCompleted ? saved.home_score : '';
      const awayVal = isCompleted ? saved.away_score : '';
      const card = document.createElement('div');
      card.className = `match-card ${isCompleted ? 'completed' : ''}`;
      card.innerHTML = `
        <div class="match-teams"><span class="home-team">${home}</span><span class="vs">VS</span><span class="away-team">${away}</span></div>
        <div class="match-score">
          <input type="number" class="score-input" id="home_${home}_${away}_${roundNum}" placeholder="H" value="${homeVal}" ${isCompleted ? 'disabled' : ''}>
          <span style="font-weight:bold;">—</span>
          <input type="number" class="score-input" id="away_${home}_${away}_${roundNum}" placeholder="A" value="${awayVal}" ${isCompleted ? 'disabled' : ''}>
          ${!isCompleted ? `<button class="update-btn" data-home="${home}" data-away="${away}" data-round="${roundNum}">✓ SAVE</button>` : '<span style="color:#1c7868;">✔ FINAL</span>'}
        </div>
      `;
      grid.appendChild(card);
    }
    // attach event listeners to update buttons
    document.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const home = btn.getAttribute('data-home');
        const away = btn.getAttribute('data-away');
        const round = parseInt(btn.getAttribute('data-round'));
        const homeInput = document.getElementById(`home_${home}_${away}_${round}`);
        const awayInput = document.getElementById(`away_${home}_${away}_${round}`);
        let hs = parseInt(homeInput.value) || 0;
        let as = parseInt(awayInput.value) || 0;
        saveMatch(home, away, round, hs, as);
      });
    });
    const prevBtn = document.getElementById('prevRound');
    const nextBtn = document.getElementById('nextRound');
    prevBtn.disabled = (currentRoundIdx === 0);
    nextBtn.disabled = (currentRoundIdx === allRounds.length - 1);
  }

  function changeRound(delta) {
    const newIdx = currentRoundIdx + delta;
    if (newIdx >= 0 && newIdx < allRounds.length) {
      currentRoundIdx = newIdx;
      renderCurrentRound();
    }
  }

  function refreshAllUI() {
    renderCurrentRound();
    renderStandings();
    refreshStatsAndHistory();
  }

  // ---------- AUTH LOGIC ----------
  let currentUserRole = null;
  function login(username, password) {
    if (username === 'user' && password === 'user123') return 'user';
    if (username === 'admin' && password === 'admin123') return 'admin';
    return null;
  }

  function setAuthSession(role) {
    currentUserRole = role;
    sessionStorage.setItem('efootball_role', role);
    sessionStorage.setItem('efootball_logged', 'true');
    document.getElementById('roleBadge').innerHTML = role === 'admin' ? '👑 ADMIN MODE' : '👤 USER MODE';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    loadMatches();
    refreshAllUI();
  }

  function logout() {
    sessionStorage.removeItem('efootball_role');
    sessionStorage.removeItem('efootball_logged');
    currentUserRole = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContainer').style.display = 'none';
    document.getElementById('loginError').innerText = '';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
  }

  function checkExistingSession() {
    const logged = sessionStorage.getItem('efootball_logged');
    const role = sessionStorage.getItem('efootball_role');
    if (logged === 'true' && (role === 'user' || role === 'admin')) {
      currentUserRole = role;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
      document.getElementById('roleBadge').innerHTML = role === 'admin' ? '👑 ADMIN MODE' : '👤 USER MODE';
      loadMatches();
      refreshAllUI();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appContainer').style.display = 'none';
    }
  }

  // ---------- BIND EVENTS ----------
  function bindEvents() {
    document.getElementById('doLoginBtn').addEventListener('click', () => {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const role = login(username, password);
      if (role) {
        setAuthSession(role);
      } else {
        document.getElementById('loginError').innerText = '❌ Invalid credentials. Try user/user123 or admin/admin123';
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('resetGlobalBtn').addEventListener('click', resetAllResults);
    document.getElementById('prevRound').addEventListener('click', () => changeRound(-1));
    document.getElementById('nextRound').addEventListener('click', () => changeRound(1));
  }

  window.addEventListener('DOMContentLoaded', () => {
    bindEvents();
    checkExistingSession();
  });
</script>
</body>
</html>
